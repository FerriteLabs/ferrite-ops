---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ferrite-ops
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/ferritelabs/ferrite-ops.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ferrite-staging
  namespace: ferrite-staging
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: charts/ferrite
      sourceRef:
        kind: GitRepository
        name: ferrite-ops
        namespace: flux-system
      interval: 5m

  releaseName: ferrite-staging

  values:
    image:
      repository: ferritelabs/ferrite
      tag: "latest"
      pullPolicy: Always

    replicaCount: 1

    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    config:
      server:
        bind: "0.0.0.0"
        port: 6379
      storage:
        max_memory: 2147483648 # 2GB
      persistence:
        aof_enabled: true
        aof_sync: "everysec"
      logging:
        level: "debug"
        format: "json"

  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true

  rollback:
    timeout: 5m
    cleanupOnFail: true

  test:
    enable: true
    timeout: 5m
