---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ferrite-ops
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/ferritelabs/ferrite-ops.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ferrite
  namespace: ferrite
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: charts/ferrite
      sourceRef:
        kind: GitRepository
        name: ferrite-ops
        namespace: flux-system
      interval: 5m

  releaseName: ferrite

  values:
    image:
      repository: ferritelabs/ferrite
      tag: "latest"
      pullPolicy: IfNotPresent

    replicaCount: 1

    resources:
      requests:
        cpu: "1"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"

    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    # Ferrite configuration (injected as ConfigMap)
    config:
      server:
        bind: "0.0.0.0"
        port: 6379
      storage:
        max_memory: 4294967296
      persistence:
        aof_enabled: true
        aof_sync: "everysec"
      logging:
        level: "info"
        format: "json"

  # Upgrade strategy
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true

  # Rollback on failure
  rollback:
    timeout: 5m
    cleanupOnFail: true

  # Test after install/upgrade
  test:
    enable: true
    timeout: 5m
