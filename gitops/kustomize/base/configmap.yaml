apiVersion: v1
kind: ConfigMap
metadata:
  name: ferrite-config
data:
  ferrite.toml: |
    [server]
    bind = "0.0.0.0"
    port = 6379

    [storage]
    databases = 16
    max_memory = 4294967296

    [persistence]
    aof_enabled = true
    aof_sync = "everysec"

    [logging]
    level = "info"
    format = "json"

    [metrics]
    enabled = true
    port = 9090
