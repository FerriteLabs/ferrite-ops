apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ferrite
spec:
  serviceName: ferrite-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ferrite
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ferrite
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ferrite
          image: ferritelabs/ferrite:latest
          ports:
            - name: resp
              containerPort: 6379
            - name: metrics
              containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/ferrite
              readOnly: true
          args:
            - "--config"
            - "/etc/ferrite/ferrite.toml"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          startupProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: ferrite-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
