apiVersion: v1
kind: Service
metadata:
  name: ferrite
spec:
  type: ClusterIP
  ports:
    - name: resp
      port: 6379
      targetPort: 6379
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    app.kubernetes.io/name: ferrite
---
apiVersion: v1
kind: Service
metadata:
  name: ferrite-headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: resp
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: ferrite
