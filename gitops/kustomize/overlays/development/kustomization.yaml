apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ferrite-dev

resources:
  - ../../base

namePrefix: dev-

patches:
  - target:
      kind: StatefulSet
      name: ferrite
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
  - target:
      kind: StatefulSet
      name: ferrite
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 1Gi

configMapGenerator:
  - name: ferrite-config
    behavior: merge
    literals:
      - ferrite.toml=|
          [storage]
          max_memory = 536870912

          [logging]
          level = "debug"
