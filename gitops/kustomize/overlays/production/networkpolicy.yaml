apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ferrite-network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ferrite
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow RESP connections from labeled pods
    - from:
        - podSelector:
            matchLabels:
              access: ferrite
      ports:
        - port: 6379
          protocol: TCP
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 9090
          protocol: TCP
    # Allow inter-pod communication (replication, cluster gossip)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ferrite
      ports:
        - port: 6379
          protocol: TCP
        - port: 16379
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow inter-pod communication
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ferrite
      ports:
        - port: 6379
          protocol: TCP
        - port: 16379
          protocol: TCP
