apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ferrite
  namespace: argocd
  labels:
    app.kubernetes.io/name: ferrite
    app.kubernetes.io/part-of: data-infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Option 1: From the Helm chart in ferrite-ops
    repoURL: https://github.com/ferritelabs/ferrite-ops.git
    targetRevision: HEAD
    path: charts/ferrite
    helm:
      releaseName: ferrite
      valueFiles:
        - values.yaml
        # Uncomment for HA deployment:
        # - values-ha.yaml
      parameters:
        - name: image.tag
          value: "latest"
        - name: resources.requests.memory
          value: "4Gi"
        - name: resources.limits.memory
          value: "8Gi"
        - name: persistence.enabled
          value: "true"
        - name: persistence.size
          value: "50Gi"
        - name: metrics.enabled
          value: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: ferrite

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s

  # Health checks for Ferrite StatefulSet
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates

  # Notifications (requires argocd-notifications)
  # annotations:
  #   notifications.argoproj.io/subscribe.on-sync-succeeded.slack: ferrite-deployments
  #   notifications.argoproj.io/subscribe.on-sync-failed.slack: ferrite-alerts
