server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.service=ferrite"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - target_label: job
        replacement: ferrite
    pipeline_stages:
      # Parse JSON log lines from Ferrite
      - json:
          expressions:
            level: level
            message: fields.message
            target: target
            span: span.name
            timestamp: timestamp
      # Map log levels to Loki levels
      - labels:
          level:
          target:
      # Set timestamp from log entry
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Only keep the message as the log line
      - output:
          source: message

  # Alternative: Collect from log files (for non-Docker deployments)
