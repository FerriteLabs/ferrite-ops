# Prometheus configuration for Ferrite monitoring
#
# Override FERRITE_HOST via environment variable (default: host.docker.internal)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  - job_name: 'ferrite'
    static_configs:
      - targets: ['host.docker.internal:9090']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 3s
