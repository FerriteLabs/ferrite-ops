name: Release

on:
  push:
    tags: ['v*']
  repository_dispatch:
    types: [ferrite-release]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v0.1.0 or latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ferrite

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # --- Supply Chain Security ---

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with Cosign (keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Generate SBOM with anchore/sbom-action
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-spdx.json
          upload-artifact: true

      - name: Attach SBOM to container image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attach sbom \
            --sbom sbom-spdx.json \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Attest SBOM with Cosign (keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom-spdx.json \
            --type spdxjson \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  verify:
    name: Verify Signatures & Attestations
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify container signature
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github\\.com/${{ github.repository_owner }}/" \
            "${IMAGE}@${DIGEST}"

      - name: Verify SBOM attestation
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DIGEST: ${{ needs.build-and-push.outputs.digest }}
        run: |
          cosign verify-attestation \
            --type spdxjson \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github\\.com/${{ github.repository_owner }}/" \
            "${IMAGE}@${DIGEST}"

  # Bump Chart.yaml version when triggered by a core release
  bump-chart:
    name: Bump Chart Version
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Update Chart.yaml
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          VERSION="${VERSION#v}"
          if [ -n "$VERSION" ]; then
            sed -i "s/^version:.*/version: ${VERSION}/" charts/ferrite/Chart.yaml
            sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/ferrite/Chart.yaml
            echo "Updated Chart.yaml to version ${VERSION}"
          fi
      - name: Create PR for version bump
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: bump chart version to ${{ github.event.client_payload.version }}"
          body: "Auto-generated by ferrite-release dispatch."
          branch: "chart-bump-${{ github.event.client_payload.version }}"
          labels: dependencies
