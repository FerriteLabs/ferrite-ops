# Ferrite Configuration
# For full documentation, see: https://ferrite.dev/docs/reference/configuration

[server]
# Address to bind to. Use 0.0.0.0 for all interfaces.
bind = "127.0.0.1"

# Port to listen on (default Redis port)
port = 6379

# Maximum simultaneous client connections
max_connections = 10000

# TCP keepalive interval in seconds (0 to disable)
tcp_keepalive = 300

[storage]
# Directory for persistent data
data_dir = "/var/lib/ferrite"

# Number of logical databases (1-16)
databases = 16

# Maximum memory usage in bytes (1GB default)
max_memory = 1073741824

# Storage backend: "memory" or "hybridlog"
backend = "memory"

[persistence]
# Enable append-only file for durability
aof_enabled = true

# Path to AOF file
aof_path = "/var/lib/ferrite/appendonly.aof"

# AOF sync policy: "always", "everysec", or "no"
aof_sync = "everysec"

# Enable periodic checkpoints
checkpoint_enabled = true

# Checkpoint path
checkpoint_path = "/var/lib/ferrite/checkpoint.rdb"

[metrics]
# Enable Prometheus metrics endpoint
enabled = true

# Metrics server port
port = 9090

# Metrics endpoint path
path = "/metrics"

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log format: "pretty" or "json"
format = "json"

# Log file path
file = "/var/log/ferrite/ferrite.log"
