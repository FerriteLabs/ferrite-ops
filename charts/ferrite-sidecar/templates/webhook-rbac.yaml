{{- if .Values.webhook.enabled }}
# ServiceAccount for the webhook server and cert generation jobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ferrite-sidecar.webhook.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ferrite-sidecar.webhook.labels" . | nindent 4 }}
---
# ClusterRole granting permissions needed by the webhook and cert jobs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ferrite-sidecar.webhook.fullname" . }}
  labels:
    {{- include "ferrite-sidecar.webhook.labels" . | nindent 4 }}
rules:
  # Permissions for the cert generation job to create/read secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  # Permissions for the cert patch job to update the webhook configuration
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: ["get", "update", "patch"]
  # Permissions for the webhook to read configmaps (sidecar config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Permissions for the webhook to read namespaces (for label checking)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
# Bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ferrite-sidecar.webhook.fullname" . }}
  labels:
    {{- include "ferrite-sidecar.webhook.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ferrite-sidecar.webhook.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ferrite-sidecar.webhook.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
