{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ferrite-sidecar.webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ferrite-sidecar.webhook.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
  selector:
    {{- include "ferrite-sidecar.webhook.selectorLabels" . | nindent 4 }}
{{- end }}
